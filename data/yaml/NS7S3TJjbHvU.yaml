content:
  markdown_content: 'Parisian periodical founded in 1833 and published _Au Bureau
    du Journal_.


    The complete volumes are part of the [Gerritsen Women''s History Collection of
    Aletta H. Jacobs](https://nicholascorniaorpheus.github.io/tresor-des-demoiselles/entity/YRK5MZJvXEBP),
    and available via [ProRequest](https://about.proquest.com/en/products-services/gerritsen/)
    via institutional log-in.


    Collected volumes for each year are scattered in several libraries around the
    world, not always including clothes patterns and musical scores.


