<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>kb-light: TEI & Facsimile Viewer</title>
        
        <!-- 1. Include Libraries -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
        
        <!-- Load local CETEIcean library (Traditional Script) -->
        <script src="./js/CETEI.js"></script>
        
        <link rel="stylesheet" href="https://teic.github.io/CETEIcean/css/tei.css">
        
        <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #viewer-container { display: flex; height: 100vh; overflow: hidden; }
        #osd-viewer { width: 50%; background-color: #333; border-right: 2px solid #ccc; }
        #tei-transcription { width: 50%; padding: 40px; overflow-y: auto; background-color: #fff; line-height: 1.6; }

        /* Styling the Isomorphic TEI Elements [6, 7] */
        tei-tei { display: block; }
        tei-body { display: block; }
        tei-div[type="column"] { display: block; margin-bottom: 2em; padding: 10px; }
        tei-head { display: block; font-size: 1.2em; font-weight: bold; margin-top: 1em; color: #2c3e50; }
        tei-p { display: block; margin: 1em 0; text-align: justify; }
        tei-fw { display: block; text-align: center; font-style: italic; margin-bottom: 20px; }
        </style>
    </head>
    <body>
        <div id="viewer-container">
            <div id="osd-viewer"></div>
            <div id="tei-transcription"></div>
        </div>

        <script>
        // Use window.onload to ensure BOTH the DOM and CETEI.js are ready [8, 9]
        window.onload = function() {
            
            // 2. Initialize OpenSeadragon
            try {
                var viewer = OpenSeadragon({
                    id: "osd-viewer",
                    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                    tileSources: {
                        type: 'image',
                        //url: 'https://raw.githubusercontent.com/NicholasCorniaOrpheus/tresor-des-demoiselles/main/data/vault/assets/OI-20144531/20144531_007.jpg'
                        url : './assets/OI-20144531/20144531_154.jpg'
                    },
                    showRotationControl: true,
                    gestureSettingsMouse: { clickToZoom: true }
                });
            } catch (e) {
                console.error("OpenSeadragon initialization failed:", e);
            }

            // 3. Initialize CETEIcean using the local library [5, 10]
            if (typeof CETEI !== "undefined") {
                const CETEIobj = new CETEI();
                
                // Using the direct raw.githubusercontent domain for CORS [11, 12]
                //const githubTEI = "https://raw.githubusercontent.com/NicholasCorniaOrpheus/tresor-des-demoiselles/main/data/vault/assets/OI-20144531/20144531_007.tei"; 
                const githubTEI = "./assets/OI-20144531/20144531_154.tei"
                
                CETEIobj.getHTML5(githubTEI, function(data) {
                    document.getElementById("tei-transcription").appendChild(data);
                    console.log("TEI successfully rendered from local library.");
                });
            } else {
                console.error("Critical Error: CETEI is not defined. Check the path to ./js/CETEI.js");
            }
        };
        </script>
    </body>
</html>
